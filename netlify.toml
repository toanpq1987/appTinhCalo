# Cấu hình Netlify — site tĩnh + serverless function cho OAuth Strava
[build]
  publish = "."
  functions = "netlify/functions"

# Đường dẫn gọn cho function: /api/strava-token
[[redirects]]
  from = "/api/strava-token"
  to = "/.netlify/functions/strava-token"
  status = 200

# Đồng bộ steps (iOS Shortcuts <-> app): /api/steps
[[redirects]]
  from = "/api/steps"
  to = "/.netlify/functions/steps"
  status = 200

# Đồng bộ giấc ngủ (iOS Shortcuts <-> app): /api/sleep
[[redirects]]
  from = "/api/sleep"
  to = "/.netlify/functions/sleep"
  status = 200
